<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Digital - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f4f7;
}

.container{
background:white;
padding:40px;
width:360px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#2e7d32;
margin-bottom:5px;
}

.subtitle{
font-size:13px;
color:#666;
margin-bottom:25px;
}

.form-group{
text-align:left;
margin-bottom:15px;
}

label{
font-size:14px;
color:#333;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
outline:none;
}

input:focus{
border-color:#2e7d32;
}

.btn{
width:100%;
background:#2e7d32;
color:white;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
margin-top:10px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#256628;
}

.links{
margin-top:15px;
font-size:13px;
}

.links a{
color:#2e7d32;
text-decoration:none;
}

.footer{
margin-top:25px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">RP DIGITAL</div>
<div class="subtitle">Restaurante Popular</div>

<form>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Digite seu email">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" placeholder="Digite sua senha">
</div>

<button class="btn">Entrar</button>

<div class="links">
Não tem conta? <a href="#">Cadastrar</a><br><br>
<a href="#">Esqueceu a senha?</a>
</div>

</form>

<div class="footer">
Universidade do Estado do Rio Grande do Norte
</div>

</div>

</body>
</html>
