<body>

  <header class="cabecalho-cardapio">
    <h1>Cardápio do Dia 🍴</h1>
    <button class="botao-fazer-pedido">Fazer Pedido</button>
  </header>

  <main class="lista-cardapio">

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Feijão</h2>
        <p>Feijão Verde e Queijo</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Arroz</h2>
        <p>Arroz Refogado com Cenoura</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Carne Acebolada</h2>
        <p>Carne Bovina com cebolas Caramelizadas</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Salada</h2>
        <p>Salada Crua com Alface, Cebola e Tomate</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Suco</h2>
        <p>Suco de Abacaxi e Hortelã</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

    <article class="item-cardapio">
      <div class="info-prato">
        <h2>Prato Completo</h2>
        <p>Feijão, Arroz, Proteína, Salada e Suco</p>
      </div>
      <i data-lucide="banknote"></i>
    </article>

  </main>

  <script>
    lucide.createIcons(); // ativa os ícones
  </script>

<script src="script.js"></script>
</body>
