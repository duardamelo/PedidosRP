<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fazer Pedido</title>
  <link rel="stylesheet" href="pedido.css" />
</head>
<body>
  <main class="container">
    <section class="cabecalho-pedido">
      <h1>Fazer Pedido 🍽️</h1>
      <p>Selecione o que deseja para o seu prato:</p>
    </section>

    <section class="lista-pedido">
      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Feijão" />
          <div class="card-pedido">
            <div class="info">
              <h2>Feijão</h2>
              <p>Feijão Verde e Queijo</p>
            </div>
          </div>
        </label>
      </div>

      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Arroz" />
          <div class="card-pedido">
            <div class="info">
              <h2>Arroz</h2>
              <p>Arroz Refogado com Cenoura</p>
            </div>
          </div>
        </label>
      </div>

      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Carne Acebolada" />
          <div class="card-pedido">
            <div class="info">
              <h2>Carne Acebolada</h2>
              <p>Carne Bovina com Cebolas Caramelizadas</p>
            </div>
          </div>
        </label>
      </div>

      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Salada" />
          <div class="card-pedido">
            <div class="info">
              <h2>Salada</h2>
              <p>Salada Crua com Alface, Cebola e Tomate</p>
            </div>
          </div>
        </label>
      </div>

      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Suco" />
          <div class="card-pedido">
            <div class="info">
              <h2>Suco</h2>
              <p>Suco de Abacaxi e Hortelã</p>
            </div>
          </div>
        </label>
      </div>

      <div class="item-pedido">
        <label>
          <input type="checkbox" name="pedido" value="Prato Completo" />
          <div class="card-pedido">
            <div class="info">
              <h2>Prato Completo</h2>
              <p>Feijão, Arroz, Proteína, Salada e Suco</p>
            </div>
          </div>
        </label>
      </div>
    </section>

    <button class="botao-confirmar">Confirmar Pedido</button>
  </main>
</body>
</html>
