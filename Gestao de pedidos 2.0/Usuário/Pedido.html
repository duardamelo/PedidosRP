<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Pedidos - Fazer Pedido</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- === Barra de navegação inferior === -->
<nav class="barra-navegacao">
    <a href="cardapio.html" class="item-navegacao" title="Cardápio">
      <i data-lucide="shopping-cart"></i>
    </a>
  
    <a href="pedido.html" class="item-navegacao" title="Fazer Pedido">
      <i data-lucide="banknote"></i>
    </a>
  
    <a href="confirmacao.html" class="item-navegacao" title="Feedback">
      <i data-lucide="message-square"></i>
    </a>
  
    <a href="perfil.html" class="item-navegacao" title="Perfil">
      <i data-lucide="user"></i>
    </a>
  </nav>
  
  <!-- Scripts dos ícones -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
  
<body>

  <header class="cabecalho-pedido">
    <h1>Fazer Pedido</h1>
    <a href="cardapio.html" class="botao-voltar">Voltar ao Cardápio</a>
  </header>

  <main class="conteudo-pedido">
    <section class="resumo-pedido">
      <h2>Resumo do Pedido</h2>

      <div class="info-pedido">
        <p><strong>Pedido:</strong> Almoço R$ 1,00</p>
        <p><strong>Código do Pedido:</strong> 01</p>
      </div>

      <div class="descricao-prato">
        <h3>Prato Completo</h3>
        <p>Feijão, Arroz, Proteína, Salada e Suco</p>
      </div>

      <div class="pagamento">
        <h3>Forma de Pagamento</h3>
        <p>Dinheiro (espécie)</p>
      </div>

      <div class="botoes-pedido">
        <button class="botao-cancelar">Cancelar</button>
        <button class="botao-confirmar">Confirmar</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
